baseURL = "https://opensky.tactical/"
languageCode = "en-us"
title = "OpenSky Intelligence"
enableRobotsTXT = true
enableEmoji = false

# Allow raw HTML in markdown content files
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[build]
  writeStats = true

[params]
  description = "Advanced AI Detection & Security Systems. Real-time intelligence powered by computer vision and scalable technology solutions."
  email = "ops@opensky.intelligence"
  address = "2646 Highway 109,\nWildwood, MO 63040"
  logo = "/images/logo-new.png"

# ─── Menus ───────────────────────────────────────────────────────────────────
[[menus.main]]
  name   = "Home"
  url    = "/"
  weight = 5

[[menus.main]]
  name   = "Capabilities"
  url    = "/capabilities/"
  weight = 10

[[menus.main]]
  name   = "Projects"
  url    = "/projects/"
  weight = 20

[[menus.main]]
  name   = "Contact"
  url    = "/contact/"
  weight = 30

[[menus.footer]]
  name   = "Capabilities"
  url    = "/capabilities/"
  weight = 10

[[menus.footer]]
  name   = "Projects"
  url    = "/projects/"
  weight = 20

[[menus.footer]]
  name   = "Contact"
