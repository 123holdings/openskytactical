{{/*
  sections/why-choose-us.html — Why Choose Us cards
  Context: . (section object from Params.sections)
*/}}
<section
  class="py-24 px-10 bg-surface border-t border-white/5"
  aria-labelledby="why-heading"
  id="why-us"
>
  <div class="mx-auto max-w-container-max">

    <div class="mb-16 text-center" data-animate>
      <h2
        id="why-heading"
        class="font-headline-lg text-primary-fixed-dim uppercase tracking-widest mb-4"
      >{{ .title }}</h2>
      <div class="w-16 h-1 bg-primary mx-auto"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
      {{ range .items }}
      <div
        class="glass-panel p-8 hover:border-primary/50 hover:-translate-y-1 transition-all duration-300 group flex flex-col items-center text-center"
        data-animate
      >
        <div
          class="mb-6 flex items-center justify-center w-12 h-12 bg-primary/10 border border-primary/20 text-primary"
          aria-hidden="true"
        >
          <span class="material-symbols-outlined text-2xl">{{ .icon }}</span>
        </div>
        <h3 class="font-data-mono text-[14px] font-bold text-on-surface uppercase tracking-wider mb-3 group-hover:text-primary transition-colors">
          {{ .title }}
        </h3>
        <p class="font-body-sm text-on-surface-variant">{{ .description }}</p>
      </div>
      {{ end }}
    </div>

  </div>
</section>
