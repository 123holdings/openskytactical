{{/*
  sections/capabilities/header.html — Capabilities page header
  Context: . (header object from Params)
*/}}
<header class="mb-16 border-b border-white/5 pb-8">
  <div class="flex items-center gap-3 mb-4">
    <div class="w-2 h-2 bg-primary rounded-full animate-pulse shadow-[0_0_8px_#00d1ff]"></div>
    <span class="font-label-tech text-primary uppercase">{{ .eyebrow }}</span>
  </div>
  <h1 class="font-display-xl text-on-surface uppercase mb-6 tracking-tight">{{ .title }}</h1>
  <p class="font-body-base text-on-surface-variant max-w-3xl border-l-2 border-primary/30 pl-4 py-1">
    {{ .description }}
  </p>
</header>
