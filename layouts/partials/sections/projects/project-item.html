{{/*
  sections/projects/project-item.html — Individual project display card
  Context: . (section object from Params.sections)
*/}}
<section class="mb-20">
  <div class="flex items-center justify-between mb-8">
    <h2 class="font-headline-lg text-headline-lg text-on-surface uppercase tracking-tight">{{ .title }}</h2>
  </div>
  
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter bg-surface-container border border-surface-container-highest p-6 rounded-lg relative overflow-hidden">
    {{/* Glass highlight effect */}}
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary/5 blur-[100px] rounded-full pointer-events-none"></div>
    
    {{/* Visual Panel */}}
    <div class="lg:col-span-7 relative h-[400px] border border-white/10 rounded-DEFAULT overflow-hidden group">
      <img alt="{{ .title }} concept" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-500 grayscale hover:grayscale-0" src="{{ .image }}"/>
      
      {{/* Overlay UI elements */}}
      <div class="absolute top-4 left-4 font-data-mono text-data-mono text-primary bg-black/60 px-2 py-1 backdrop-blur-md border border-white/10">{{ .tag }}</div>
      <div class="absolute bottom-4 right-4 flex gap-2">
        <div class="w-8 h-8 rounded-DEFAULT bg-black/60 backdrop-blur-md border border-white/10 flex items-center justify-center">
          <span class="material-symbols-outlined text-on-surface text-sm">fullscreen</span>
        </div>
      </div>
    </div>

    {{/* Data Panel */}}
    <div class="lg:col-span-5 flex flex-col gap-6 justify-center z-10">
      <div class="border-l border-primary/30 pl-6 py-4 bg-primary/5">
        <p class="font-body-base text-on-surface-variant leading-relaxed">
          {{ .description }}
        </p>
      </div>
    </div>
  </div>
</section>
