{{/*
  sections/projects/header.html — Projects page header
  Context: . (header object from Params)
*/}}
<section class="mb-16 border-b border-surface-container-high pb-8">
  <div class="flex items-center gap-4 mb-4">
    <div class="w-2 h-2 bg-primary shadow-[0_0_8px_rgba(0,209,255,0.8)]"></div>
    <span class="font-label-tech uppercase text-primary tracking-widest">{{ .eyebrow }}</span>
  </div>
  <h1 class="font-display-xl text-display-xl text-on-surface mb-6 uppercase tracking-tighter">{{ .title }}</h1>
  <p class="font-body-base text-body-base text-on-surface-variant max-w-3xl">
    {{ .description }}
  </p>
</section>
